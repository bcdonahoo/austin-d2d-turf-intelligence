<svg width="760" height="220" viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" xml:space="preserve" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">
  <title>austin-d2d-turf-intelligence — live terminal walkthrough</title>
  <defs>
    <clipPath id="win"><rect width="760" height="220" rx="10"/></clipPath>
