    <!-- Scene 1: live scrape -->
    <text x="20" y="56" opacity="0"><tspan fill="#3fb950">$ </tspan><tspan fill="#e6edf3">python -m outage_scraper.scraper once</tspan>
      <animate attributeName="opacity" attributeType="XML" calcMode="discrete" dur="24s" repeatCount="indefinite" keyTimes="0;0.002083;0.166667;1" values="0;1;0;0"/>
    </text>
